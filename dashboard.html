<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox Dashboard — Elba Ouma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animation.css">
  <style>
    /* Private Dashboard custom tweaks */
    .dashboard-login {
      max-width: 400px;
      margin: 8rem auto;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: 0 20px 60px var(--shadow);
      text-align: center;
    }
    .dashboard-login h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .dashboard-login p {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .dashboard-wrap {
      display: none; /* Toggled by JS */
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2.5rem;
      margin-bottom: 3rem;
    }
    .dashboard-title-wrap h1 {
      font-size: 4rem;
      font-weight: 800;
      line-height: 0.9;
    }
    .inbox-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 5rem;
    }
    .message-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .message-card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 30px var(--shadow);
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .message-sender {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .message-sender h3 {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .message-sender span {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
    }
    .message-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }
    .message-body {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      color: var(--primary);
      white-space: pre-wrap;
    }
    .message-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      border: 1px dashed var(--border-2);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">Elba Ouma</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="theme-switcher" aria-label="Theme picker">
      <button class="theme-swatch neon" type="button" data-theme="neon" aria-label="Neon theme"></button>
      <button class="theme-swatch sunset" type="button" data-theme="sunset" aria-label="Sunset theme"></button>
      <button class="theme-swatch forest" type="button" data-theme="forest" aria-label="Forest theme"></button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Login Gate -->
  <div class="dashboard-login fade-up" id="loginGate">
    <h2>Access Inbox</h2>
    <p>Authentication key required for inbox dashboard</p>
    <form id="loginForm">
      <div class="form-group" style="margin-bottom: 2rem;">
        <label for="adminKey">Authorization Key</label>
        <input type="password" id="adminKey" placeholder="Enter key..." required style="text-align: center;">
      </div>
      <button type="submit" class="btn solid full-width">Access Dashboard</button>
      <div style="margin-top: 1.25rem;">
        <a href="#" id="forgotBtn" style="font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-decoration: underline;">Forgot Key? Recovery Notify →</a>
      </div>
    </form>
    <div class="form-success" id="loginError" style="margin-top: 1rem;"></div>
  </div>

  <!-- Dashboard Content -->
  <div class="dashboard-wrap" id="dashboardWrap">
    <section class="section">
      <div class="dashboard-header fade-up">
        <div class="dashboard-title-wrap">
          <div class="eyebrow">Admin Console</div>
          <h1>Inbox.<br><em>Messages.</em></h1>
        </div>
        <button id="logoutBtn" class="btn outline">Log Out</button>
      </div>

      <div class="inbox-grid fade-up delay-1" id="inboxGrid">
        <!-- Rendered dynamically by JS -->
      </div>
    </section>
  </div>

  <footer class="footer">
    <p>© 2025 Elba Ouma</p>
    <p>Secure Console.</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
